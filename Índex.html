<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Lara Kelly 💛</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
background: linear-gradient(135deg,#ffe0ec,#ffd6a5,#ffcad4);
min-height:100vh;
overflow-x:hidden;
color:#333;
}

/* CORAÇÕES */
.heart{
position:fixed;
top:-10px;
color:#ff4d6d;
animation:fall linear infinite;
font-size:16px;
opacity:0.7;
}

@keyframes fall{
to{transform:translateY(110vh);opacity:0;}
}

/* CONTAINER */
.container{
width:95%;
max-width:900px;
margin:40px auto;
background:white;
border-radius:25px;
padding:25px;
box-shadow:0 20px 60px rgba(0,0,0,0.25);
animation:fadeIn 1.2s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

h1{
text-align:center;
font-size:34px;
color:#e11d74;
}

.subtitle{
text-align:center;
margin-top:10px;
color:#666;
font-size:15px;
}

/* CARD */
.card{
margin-top:20px;
background:#fff0f6;
padding:20px;
border-radius:20px;
border-left:5px solid #e11d74;
}

/* CONTADOR */
.counter{
text-align:center;
margin-top:20px;
font-size:18px;
color:#e11d74;
font-weight:bold;
}

/* CARROSSEL */
.carousel{
margin-top:20px;
overflow:hidden;
border-radius:20px;
height:260px;
}

.slides{
display:flex;
width:200%;
animation:slide 8s infinite;
}

.slides img{
width:100%;
height:260px;
object-fit:cover;
}

@keyframes slide{
0%{transform:translateX(0);}
50%{transform:translateX(-100%);}
100%{transform:translateX(0);}
}

/* TIMELINE */
.timeline{
margin-top:25px;
}

.item{
margin-bottom:15px;
padding-left:15px;
border-left:3px solid #ff69b4;
}

.item h3{
color:#e11d74;
}

/* BOTÃO */
.btn{
display:block;
margin:25px auto 0;
padding:12px 20px;
background:#e11d74;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
background:#b01259;
}
